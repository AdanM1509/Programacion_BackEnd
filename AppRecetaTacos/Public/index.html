<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tacoschidos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .icon-circle {
      transition: all 0.3s ease;
    }
    .icon-circle:hover {
      transform: scale(1.12);
      box-shadow: 0 15px 25px -5px rgb(0 0 0 / 0.15);
    }
    .icon-circle.active {
      border-color: #f43f5e;
      box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.2);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-amber-50 to-white min-h-screen font-sans">

  <div class="max-w-2xl mx-auto p-8 pt-12">

    <!-- Header -->
    <div class="flex items-center justify-center gap-3 mb-12">
      <h1 class="text-5xl font-bold text-rose-600 tracking-tight">Tacoschidos</h1>
      <span class="text-6xl">🌮</span>
    </div>

    <!-- Iconos -->
    <div class="flex justify-center gap-8 mb-16" id="iconos">
      <!-- Se llenan con JavaScript -->
    </div>

    <!-- Contenido del taco -->
    <div class="text-center mb-8">
      <h2 id="nombre-taco" class="text-4xl font-semibold text-rose-600 mb-2">
        Taco lechón
      </h2>
    </div>

    <div class="max-w-lg mx-auto bg-white rounded-3xl shadow-xl p-8">
      <h3 class="text-xl font-medium text-gray-800 mb-6 border-b pb-3">Ingredientes:</h3>
      
      <div class="space-y-5 text-gray-700">
        <div class="flex justify-between">
          <span class="font-medium">Carne:</span>
          <span id="carne" class="text-right">Puerco, Horneado</span>
        </div>
        <div class="flex justify-between">
          <span class="font-medium">Salsa:</span>
          <span id="salsa" class="text-right">Tomate verde (Medio)</span>
        </div>
        <div class="pt-4 border-t">
          <span class="font-medium block mb-3">Acompañamientos:</span>
          <div id="acompanamientos" class="space-y-2 text-sm">
            <!-- Se llenan con JS -->
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const tacos = [
      {
        "type": "Puerco",
        "nombre": "Taco lechón",
        "carne": { "tipo": "Puerco", "preparacion": "Horneado" },
        "salsa": { "nombre": "Tomate verde", "intensidad": "Medio" },
        "acompañamientos": [
          { "cantidad": "1 cucharada", "ingrediente": "Cebolla" },
          { "cantidad": "2 cucharadas", "ingrediente": "Guacamole" }
        ],
        "emoji": "🐷"
      },
      {
        "type": "Pollo",
        "nombre": "Taco de Pollo",
        "carne": { "tipo": "Pollo", "preparacion": "A la plancha" },
        "salsa": { "nombre": "Chipotle", "intensidad": "Picante" },
        "acompañamientos": [
          { "cantidad": "1 cucharada", "ingrediente": "Lechuga" },
          { "cantidad": "2 cucharadas", "ingrediente": "Pico de gallo" }
        ],
        "emoji": "🐔"
      },
      {
        "type": "Res",
        "nombre": "Taco de Res",
        "carne": { "tipo": "Res", "preparacion": "Asado" },
        "salsa": { "nombre": "Roja", "intensidad": "Fuerte" },
        "acompañamientos": [
          { "cantidad": "1 cucharada", "ingrediente": "Cebolla morada" },
          { "cantidad": "2 cucharadas", "ingrediente": "Cilantro" }
        ],
        "emoji": "🦌"
      },
      {
        "type": "Huevo",
        "nombre": "Taco de Huevo",
        "carne": { "tipo": "Huevo", "preparacion": "Estrellado" },
        "salsa": { "nombre": "Tomate rojo", "intensidad": "Suave" },
        "acompañamientos": [
          { "cantidad": "1 cucharada", "ingrediente": "Frijoles refritos" },
          { "cantidad": "2 cucharadas", "ingrediente": "Queso fresco" }
        ],
        "emoji": "🥚"
      }
    ];

    const iconosContainer = document.getElementById('iconos');
    let tacoActual = 0;

    // Crear los iconos
    tacos.forEach((taco, index) => {
      const div = document.createElement('div');
      div.className = `icon-circle w-24 h-24 bg-white rounded-full shadow-md flex items-center justify-center text-6xl border-4 border-transparent cursor-pointer ${index === 0 ? 'active' : ''}`;
      div.textContent = taco.emoji;
      div.title = taco.nombre;
      
      div.addEventListener('click', () => {
        tacoActual = index;
        actualizarTaco(taco);
        
        // Quitar active a todos y poner al actual
        document.querySelectorAll('.icon-circle').forEach(el => el.classList.remove('active'));
        div.classList.add('active');
      });
      
      iconosContainer.appendChild(div);
    });

    // Función para actualizar la información
    function actualizarTaco(taco) {
      document.getElementById('nombre-taco').textContent = taco.nombre;
      
      document.getElementById('carne').innerHTML = `
        ${taco.carne.tipo}, <span class="text-rose-500">${taco.carne.preparacion}</span>
      `;
      
      document.getElementById('salsa').innerHTML = `
        ${taco.salsa.nombre} <span class="text-rose-500">(${taco.salsa.intensidad})</span>
      `;

      const acompContainer = document.getElementById('acompanamientos');
      acompContainer.innerHTML = '';

      taco.acompañamientos.forEach(acom => {
        const p = document.createElement('div');
        p.className = "flex justify-between";
        p.innerHTML = `
          <span>${acom.cantidad} :</span>
          <span class="font-medium">${acom.ingrediente}</span>
        `;
        acompContainer.appendChild(p);
      });
    }

    // Mostrar el primer taco al cargar
    actualizarTaco(tacos[0]);
  </script>
</body>
</html>
